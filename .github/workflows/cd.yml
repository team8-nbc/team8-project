name: Deploy to EC2

on:
  push:
    branches: [ "main", "test/deploy" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Build
        run: docker build -t eightyage .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: ECR Login
        run: |
          aws ecr get-login-password | \
          docker login --username AWS --password-stdin 060795921224.dkr.ecr.ap-northeast-2.amazonaws.com/eightyage

      - name: Docker Images Check
        run: docker images

      - name: ECR Push
        run: |
          docker tag eightyage:latest 060795921224.dkr.ecr.ap-northeast-2.amazonaws.com/eightyage:latest
          docker push 060795921224.dkr.ecr.ap-northeast-2.amazonaws.com/eightyage:latest

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull 060795921224.dkr.ecr.ap-northeast-2.amazonaws.com/eightyage:latest
            docker stop eightyage || true
            docker rm eightyage || true
            docker run -d -p 8080:8080 --name eightyage 060795921224.dkr.ecr.ap-northeast-2.amazonaws.com/eightyage:latest

      - name: Health Check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sleep 5
            curl -f http://localhost:8080/actuator/health || exit 1