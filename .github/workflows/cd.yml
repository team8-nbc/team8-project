name: Deploy to EC2

on:
  push:
    branches: [ "main", "test/deploy" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Build
        run: docker build -t eightyage .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: ECR Login
        run: |
          aws ecr get-login-password | \
          docker login --username AWS --password-stdin ${{ secrets.ECR_URI }}

      - name: Docker Images Check
        run: docker images

      - name: ECR Push
        run: |
          docker tag eightyage:latest ${{ secrets.ECR_URI }}
          docker push ${{ secrets.ECR_URI }}

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_URI,DB_URL,DB_USER,DB_PASSWORD,JWT_SECRET_KEY

          script: |
            docker pull $ECR_URI
            docker run -d -p 8080:8080 \
              -e DB_URL=$DB_URL \
              -e DB_USER=$DB_USER \
              -e DB_PASSWORD=$DB_PASSWORD \
              -e JWT_SECRET_KEY=$JWT_SECRET_KEY \
              $ECR_URI \
              --spring.profiles.active=prod

      - name: Health Check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sleep 5
            curl -f http://localhost:8080/actuator/health || exit 1